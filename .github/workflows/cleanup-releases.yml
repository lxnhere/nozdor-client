name: Cleanup old releases

# Ручная зачистка: оставить один тег (по умолчанию v1.0.50).
# Обычно не нужен: при каждом push в main workflow release.yml сам оставляет только текущий релиз.
# Запуск: Actions → Cleanup old releases → Run workflow.
on:
  workflow_dispatch:
    inputs:
      keep_tag:
        description: "Тег релиза, который оставить (например v1.0.50)"
        required: true
        default: "v1.0.50"

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const keep = "${{ github.event.inputs.keep_tag }}" || "v1.0.50";
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            let deleted = 0;
            for (;;) {
              const { data: releases } = await github.rest.repos.listReleases({
                owner,
                repo,
                per_page: 100,
                page: 1,
              });
              const victims = releases.filter((r) => r.tag_name !== keep);
              if (victims.length === 0) break;
              for (const r of victims) {
                core.info(`Deleting release ${r.tag_name} (id ${r.id})`);
                await github.rest.repos.deleteRelease({
                  owner,
                  repo,
                  release_id: r.id,
                });
                deleted++;
              }
            }
            core.notice(`Done. Deleted ${deleted} release(s). Kept ${keep}.`);
