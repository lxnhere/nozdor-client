name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        run: |
          VERSION=$(cat version.txt | tr -d '[:space:]')
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "TAG=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Delete existing release and tag if exists
        run: |
          TAG="v${{ steps.version.outputs.VERSION }}"
          # Удаляем старый релиз если есть
          gh release delete "$TAG" --yes 2>/dev/null || true
          # Удаляем старый тег если есть
          git push origin ":refs/tags/$TAG" 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: "NozdorClientStripe v${{ steps.version.outputs.VERSION }}"
          body: |
            ## NozdorClientStripe v${{ steps.version.outputs.VERSION }}

            ### Установка
            Скачай `NozdorClientStripe.zip`, распакуй и запусти `NozdorClientStripe.exe`.

            ### Обновление
            Программа обновится автоматически при следующем запуске.
          files: NozdorClientStripe.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Done
        run: echo "Release v${{ steps.version.outputs.VERSION }} published. Server will auto-detect via GitHub API."
